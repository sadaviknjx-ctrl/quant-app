name: Update Quant Report

on:
  schedule:
    - cron: '30 9 * * 1-5'   # Mon–Fri 17:30 Beijing (09:30 UTC) — 给新浪数据源留出发布延迟缓冲
  workflow_dispatch:            # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate stock screener
        run: python scripts/stock_screener.py
        timeout-minutes: 12

      - name: Update data and generate report
        run: python scripts/generate_report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "chore: update report $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
