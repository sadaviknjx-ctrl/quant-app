<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>选股推荐</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--color-background-tertiary,#f5f5f3);color:var(--color-text-primary,#1d1d1f);font-family:-apple-system,sans-serif;padding:16px;max-width:540px;margin:0 auto}
  h1{font-size:18px;font-weight:500;margin-bottom:4px}
  .subtitle{font-size:12px;color:#888;margin-bottom:16px}
  .card{background:#fff;border:0.5px solid #e5e5e7;border-radius:12px;padding:24px;text-align:center;margin-bottom:12px}
  .tip{font-size:13px;color:#666;line-height:1.8}
  .back-btn{display:block;width:100%;padding:12px;background:#f5f5f7;color:#333;border:0.5px solid #ddd;border-radius:10px;font-size:14px;font-weight:500;text-align:center;text-decoration:none;margin-top:12px}
</style>
</head>
<body>
<h1>🔍 选股推荐</h1>
<div class="subtitle">每日15:45自动更新</div>
<div class="card">
  <div class="tip">
    数据每日收盘后自动生成<br>
    今日数据将在下一个交易日收盘后更新<br><br>
    <strong>筛选标准</strong><br>
    股价 3–20元 · 换手率≥1% · 成交额≥5000万<br>
    近20日日均波幅 2%–8%（适合做T）<br>
    非ST / 非退市股
  </div>
</div>
<a class="back-btn" href="index.html">← 返回持仓信号</a>
</body>
</html>
